services:
  fintech.api:
    image: ${DOCKER_REGISTRY-}fintechapi
    build:
      context: .
      dockerfile: src/FinTech.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
      - "8081:8081"
    restart: on-failure
    depends_on:
      fintech.db:
        condition: service_healthy

  fintech.db:
    image: postgres:latest
    container_name: fintech.db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintech
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintech || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
